[project]
name = "agentyun"
version = "0.1.0"
description = "CLI for Agent Cloud Drive"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
authors = [
    {name = "Agent Cloud", email = "dev@agentyun.dev"}
]
dependencies = [
    "agentyun-sdk",
    "click>=8.1.0",
    "rich>=13.0.0",
]

[project.scripts]
agentyun = "agentyun_cli.__main__:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agentyun_cli*"]